# Sentinel Security Monitor — Docker Compose
#
# Usage:
#   docker-compose up -d --build          # SQLite (default)
#   docker-compose --profile pg up -d --build  # PostgreSQL

services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_DRIVER=sqlite
      - DATABASE_URL=/data/sentinel.db
      - DATA_DIR=/data
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

